version: "3.9"

# ---------------------------------------------------------------------------
# Shared base for all services
# ---------------------------------------------------------------------------
x-base: &base
  image: python:3.11-slim
  working_dir: /app
  volumes:
    - ./:/app
    - pip-cache:/root/.cache/pip  # re-use downloaded wheels across restarts
  restart: unless-stopped

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ---------- HLA tool server (EBI IMGT/HLA) --------------------------------
  hla-server:
    <<: *base
    command: >
      sh -c "pip install -q -r requirements.txt &&
             uvicorn servers.hla_server:app --host 0.0.0.0 --port 8101"
    ports:
      - "8101:8101"
    environment:
      - EBI_HLA_API_URL=${EBI_HLA_API_URL:-https://www.ebi.ac.uk/cgi-bin/ipd/api/allele}
      - HLA_DATA_FILE=${HLA_DATA_FILE:-examples/hla_seed.csv}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- Main API gateway (port 8000) -----------------------------------
  tcr-explorer:
    <<: *base
    command: >
      sh -c "pip install -q -r requirements.txt &&
             PYTHONPATH=src uvicorn tcr_explorer.api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      # HLA tool server (use the Docker service name, not 127.0.0.1)
      - HLA_SERVER_URL=http://hla-server:8101
    depends_on:
      - hla-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pip-cache:
    driver: local
